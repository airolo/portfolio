<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Portfolio of an Information Technology Software Engineer" />
    <title>Bradley Soloria</title>
    <style>
      :root {
        color-scheme: light;
      }

      body[data-app-ready='true'] #loading-screen {
        opacity: 0;
        visibility: hidden;
      }

      body[data-app-ready='true'] #root {
        opacity: 1;
      }

      #root {
        opacity: 0;
        transition: opacity 280ms ease;
      }

      #loading-screen {
        position: fixed;
        inset: 0;
        z-index: 9999;
        display: grid;
        place-items: center;
        background:
          radial-gradient(circle at top, rgba(255, 255, 255, 0.95), rgba(245, 245, 245, 0.96) 42%, rgba(228, 228, 231, 0.98)),
          linear-gradient(135deg, rgba(9, 9, 11, 0.03), rgba(9, 9, 11, 0));
        color: #09090b;
        transition: opacity 1200ms ease, visibility 1200ms ease;
      }

      .loading-card {
        display: grid;
        place-items: center;
        gap: 1rem;
        padding: 2rem 2.5rem;
      }

      .loading-mark {
        display: inline-flex;
        align-items: center;
        gap: 0.5rem;
        font: 800 clamp(2.75rem, 10vw, 5.5rem) / 1 Inter, system-ui, sans-serif;
        letter-spacing: 0.18em;
      }

      .loading-mark span {
        display: inline-block;
        transform-origin: center;
        animation: loading-bounce 1.2s ease-in-out infinite;
        text-shadow: 0 0 24px rgba(24, 24, 27, 0.08);
      }

      .loading-mark span:nth-child(2) {
        animation-delay: 0.12s;
      }

      .loading-mark span:nth-child(3) {
        animation-delay: 0.24s;
      }

      .loading-ring {
        width: 4.5rem;
        height: 4.5rem;
        border-radius: 9999px;
        border: 1px solid rgba(24, 24, 27, 0.14);
        border-top-color: rgba(24, 24, 27, 0.9);
        animation: loading-spin 1s linear infinite;
      }

      .loading-copy {
        margin: 0;
        font: 500 0.875rem/1.5 Inter, system-ui, sans-serif;
        letter-spacing: 0.24em;
        text-transform: uppercase;
        color: rgba(24, 24, 27, 0.58);
      }

      @keyframes loading-bounce {
        0%,
        100% {
          transform: translateY(0) scale(1);
          opacity: 0.76;
        }

        50% {
          transform: translateY(-0.5rem) scale(1.06);
          opacity: 1;
        }
      }

      @keyframes loading-spin {
        to {
          transform: rotate(360deg);
        }
      }
    </style>
    <script type="module" crossorigin src="/assets/index-DZNxBDZj.js"></script>
    <link rel="stylesheet" crossorigin href="/assets/index-BcnwL_Mb.css">
  </head>
  <body class="bg-white text-zinc-950 antialiased dark:bg-zinc-950 dark:text-zinc-50">
    <div id="loading-screen" role="status" aria-live="polite" aria-label="Loading portfolio">
      <div class="loading-card">
        <div class="loading-mark" aria-hidden="true">
          <span>B</span>
          <span>G</span>
          <span>S</span>
        </div>
        <div class="loading-ring" aria-hidden="true"></div>
        <p class="loading-copy">Loading portfolio</p>
      </div>
    </div>
    <div id="root"></div>
    <script>
      const markAppReady = () => {
        document.body.dataset.appReady = 'true';
      };

      if (document.readyState === 'complete') {
        markAppReady();
      } else {
        window.addEventListener('load', markAppReady, { once: true });
      }
    </script>
  </body>
</html>
